        /* Estilo principal para el contenedor del slider */
#slider {
    position: relative;
    width: 80%;
    max-width: 800px;
    max-height: 600px;
    margin: auto;
    overflow: hidden;
    border: 2px solid #ccc;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Estilo de las flechas */
.siguiente, .anterior {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 40px;
    background-color: rgba(0, 0, 0, 0.5);
    color: white;
    text-align: center;
    line-height: 40px;
    font-size: 20px;
    font-weight: bold;
    border-radius: 50%;
    cursor: pointer;
    z-index: 10;
    text-decoration: none;
}

.siguiente:hover, .anterior:hover {
    background-color: rgba(0, 0, 0, 0.8);
}

.siguiente {
    right: 10px;
}

.anterior {
    left: 10px;
}

/* Estilo para la lista y elementos del slider */
#slider ul {
    display: flex;
    padding: 0;
    margin: 0;
    list-style: none;
    transition: transform 0.5s ease-in-out;
}

/*#slider li {
    min-width: 100%;
    box-sizing: border-box;
    text-align: center;
}*/

#slider li {
    width: 100%; /* Establece un ancho fijo */
    height: 200px; /* Establece una altura fija */
    /*overflow: hidden; /* Oculta cualquier parte de las imágenes que sobresalga */
    display: flex; /* Centra el contenido usando flexbox */
    justify-content: center; /* Centra horizontalmente */
    align-items: center; /* Centra verticalmente */
    /*background-color: #f0f0f0; /* Fondo opcional para diseño */
}

#slider li img {
    /*width: 100%;*/
    height: 100%; /* La imagen se ajustará al tamaño del contenedor */
    display: block;
}

/* Estilo de la opción deslizamiento */
.opcion-slider {

}

.opcion-slider label {
