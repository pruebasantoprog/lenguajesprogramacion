        /* Estilo principal para el contenedor del slider */
#slider {
    position: relative;
    width: 80%;
    max-width: 800px;
    max-height: 600px;
    margin: auto;
    overflow: hidden;
    border: 2px solid #ccc;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Estilo de las flechas */
.siguiente, .anterior {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 40px;
    background-color: rgba(0, 0, 0, 0.5);
    color: white;
    text-align: center;
    line-height: 40px;
    font-size: 20px;
    font-weight: bold;
    border-radius: 50%;
    cursor: pointer;
    z-index: 10;
    text-decoration: none;
}

.siguiente:hover, .anterior:hover {
    background-color: rgba(0, 0, 0, 0.8);
}

.siguiente {
    right: 10px;
}

.anterior {
    left: 10px;
}

/* Estilo para la lista y elementos del slider */
#slider ul {
    display: flex;
    padding: 0;
    margin: 0;
    list-style: none;
    transition: transform 0.5s ease-in-out;
}

/*#slider li {
    min-width: 100%;
    box-sizing: border-box;
    text-align: center;
}*/

#slider li {
    width: 100%; /* Establece un ancho fijo */
    height: 200px; /* Establece una altura fija */
    /*overflow: hidden; /* Oculta cualquier parte de las imágenes que sobresalga */
    display: flex; /* Centra el contenido usando flexbox */
    justify-content: center; /* Centra horizontalmente */
    align-items: center; /* Centra verticalmente */
    /*background-color: #f0f0f0; /* Fondo opcional para diseño */
}

#slider li img {
    /*width: 100%;*/
    height: 100%; /* La imagen se ajustará al tamaño del contenedor */
    display: block;
}

/* Estilo de la opción deslizamiento */
.opcion-slider {
    text-align: center;
    margin-top: 10px;
}

.opcion-slider label {
    font-size: 16px;
    color: #333;

}

    <!--jQuery-->
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>

<body class="estilopagina">
    
    <div class="inicio">
        <h1><i class='bx bx-palette bx-md'></i>Nombres de colores soportados por el Navegador</h1>
        <!--<br/>-->
        <em id="descPagina">Muestra colores con el nombre, código hexadecimal y RGB usando jQuery con AJAX, obteniendo los datos de un XML y mostrando un icono de boxicons de cada color seleccionado.</em>
        <button id="controlarDesc">Ocultar Descripción</button>
        <br/><br>
        <div id="slider">
            <a href="#" class="siguiente">></a>
            <a href="#" class="anterior"><</a>
            <ul>
                <li><img src="images/jquery1.png" alt="Imagen 1"></li>
                <li style="background: #bbb"><img src="images/jquery2.png" alt="Imagen 2"></li>
                <li><img src="images/jquery3.jpg" alt="Imagen 3"></li>
                <li style="background: #bbb"><img src="images/jquery4.jpg" alt="Imagen 4"></li>
            </ul>
        </div>
    
        <div class="opcion-slider">
            <input type="checkbox" id="checkbox">
            <label for="checkbox">Deslizamiento automático</label>
        </div>
    
        <!--Mirar porque Slider.js no esta en esta carpeta-->
        <script src="Slider.js"></script>
        <fieldset>
            <legend>Seleccione un color:</legend>
            <input type="radio" id="todos" name="colores" value="todos" checked />
            <label for="todos">Todos</label>
            <input type="radio" id="rojo" name="colores" value="Rojo"/>
            <label for="rojo" class="textoRojo">Rojo</label>
            <input type="radio" id="rosa" name="colores" value="Rosa"/>
            <label for="rosa" class="textoRosa">Rosa</label>
            <input type="radio" id="blanco" name="colores" value="Blanco"/>
            <label for="blanco" class="textoBlanco">Blanco</label>
            <input type="radio" id="naranja" name="colores" value="Naranja"/>
            <label for="naranja" class="textoNaranja">Naranja</label>
            <input type="radio" id="gris" name="colores" value="Gris"/>
            <label for="gris" class="textoGris">Gris</label>
            <input type="radio" id="amarillo" name="colores" value="Amarillo"/>
            <label for="amarillo" class="textoAmarillo">Amarillo</label>
            <input type="radio" id="marron" name="colores" value="Marrón"/>
            <label for="marron" class="textoMarron">Marrón</label>
            <input type="radio" id="verde" name="colores" value="Verde"/>
            <label for="verde" class="textoVerde">Verde</label>
            <input type="radio" id="purpura" name="colores" value="Púrpura"/>
            <label for="purpura" class="textoPurpura">Púrpura</label>
            <input type="radio" id="azul" name="colores" value="Azul"/> 
            <label for="azul" class="textoAzul">Azul</label>

            <button id="cargarDatos">Cargar colores</button>
            <br/><br/>
        </fieldset>

    <br/>
    <div>
        <table id="datos"></table>
    </div>

    <script>

        let intervalo;
        //Ready se ejecuta cuando se carga el documento
        jQuery(document).ready(function($){

            console.log('Entar en ready');
    
   
            let totalElementosLista=$("#slider ul li").length;
            let widthElementoLista=$("#slider ul li").width();
            let heightElementoLista=$("#slider ul li").height();
            let totalElementosWidth = totalElementosLista * widthElementoLista;

            //Decimos que el tamaño del slider es igual al de un elemento de la lista
            $("#slider").css({width:widthElementoLista, height:heightElementoLista});
            $("#slider ul").css({width:totalElementosWidth, marginLeft: -widthElementoLista});

            //El método prependTo en jQuery es utilizado para insertar contenido al principio de otro elemento en el DOM. Básicamente, 
            //toma el elemento o elementos seleccionados y los añade como los primeros hijos de un elemento destino.
            $("#slider ul ul li:last-child").prependTo("#slider ul");


            function moverIquierda(){
                console.log("Entra en moverIquierda");
                $("#slider ul").animate({
                    left: + widthElementoLista
                }, 200, function(){
                //El método prependTo en jQuery es utilizado para insertar contenido al principio de otro elemento en el DOM. Básicamente, 
                //toma el elemento o elementos seleccionados y los añade como los primeros hijos de un elemento destino.
                $("#slider ul li:last-child").prependTo("#slider ul");
                $('#slider ul').css('left','');
                });
            };

            function moverDerecha(){
                console.log("Entra en moverDerecha");
                $("#slider ul").animate({
                    left: - widthElementoLista
                }, 200, function(){
                    console.log("Entra en funcion");
                    //El método prependTo en jQuery es utilizado para insertar contenido al principio de otro elemento en el DOM. Básicamente, 
                    //toma el elemento o elementos seleccionados y los añade como los primeros hijos de un elemento destino.
                    $("#slider ul li:first-child").appendTo("#slider ul");
                    $('#slider ul').css('left','');
                });
            };

            $('a.anterior').on('click',function(){
                console.log("Pulsa anterior");
                moverIquierda();
            });

            $('a.siguiente').on('click',function(){
                console.log("Pulsa siguiente");
                moverDerecha();
            });

            $('#checkbox').on('change',function(){
                console.log("Pulsa check");
                if ($(this).is(':checked')) {
                    console.log("Entra en id checked");
                    intervalo=setInterval(function(){
                    moverDerecha();
                }, 3000);
                }else {
                    console.log("Checkbox deshabilitado");
                    // Detener el intervalo
                    clearInterval(intervalo);
                }    
            });

            //Mostramos uocultamos la descripción de la página
            $("#controlarDesc").click(function(){
                $("#descPagina").slideToggle(3000);
                let textoBoton=$("#controlarDesc").text();
                if(textoBoton=="Ocultar Descripción"){
                    $("#controlarDesc").text("Mostrar Descripción");
                }else{
                    $("#controlarDesc").text("Ocultar Descripción");
                }
            });

        });//Fin jQuery(document).ready(function($){
        
        $("#cargarDatos").on("click", cargarDatos);

        //Al principio ocultamos la tabla para que no se vea una línea en donde está la tabla
        $("#datos").hide();

        function cargarDatos() {

            console.log("Entra en cargarDatos");

            //let docXML;

            const listarColores=()=>{
            $.ajax({

                type:'GET',
                url:'xml/Colores.xml',
                contentType:'application/xml',
                dataType: 'xml',
                async:true,
               
            }).done((data)=>{
                
                let fila=$("<tr><th>Color</th><th>Nombre</th><th>Hexadecimal</th><th>RGB</th><th>Muestra</th></tr>");

                let valorHexadecimal="";
                let color="";
                let claseIcono="";

                //Obtenemos el color seleccionado
                let valorSeleccionado = $('input[name="colores"]:checked').val();

                console.log('valorseleccionado',valorSeleccionado);

                //Vaciamos el contenido de la tabla para que se pinte cada vez que pulsan el botón
                $('#datos').empty();

                $('#datos').append(fila);

                $(data).find('COLORES').each(function(){
                       
                        fila=$("<tr>");
                        switch($(this).find('COLOR').text().trim()){
                            case 'Rojo':
                                color='red';
                                claseIcono="bxs-ambulance"
                                break;
                            case 'Rosa':
                                color='HotPink';
                                claseIcono="bxs-popsicle";
                                break;
                            case 'Blanco':
                                color="White";
                                claseIcono="bxs-paint";
                                break;
                            case 'Naranja':
                                color='DarkOrange';
                                claseIcono="bx-basketball"
                                break;
                            case 'Gris':
                                color="Gray";
                                claseIcono="bxs-bookmark-alt";
                                break;
                            case 'Amarillo':
                                color='yellow';
                                claseIcono="bxs-lemon";
                                break;
                            case 'Marrón':
                                color="SaddleBrown";
                                claseIcono="bxs-coffee-bean";
                                break;
                            case 'Verde':
                                color="DarkGreen";
                                claseIcono="bxl-spring-boot";
                                break;
                            case 'Púrpura':
                                color="BlueViolet";
                                break;
                            case 'Azul':
                                color="blue";
                                claseIcono="bx-cloud-drizzle";
                                break;
                            default:
                                color="black";
                                claseIcono="bx bx-book";
                        }

                        if(valorSeleccionado=='todos' || valorSeleccionado==$(this).find('COLOR').text()){
                            fila.append($(`<td style='color:${color}; text-shadow:1px 1px Black;'>${$(this).find('COLOR').text().trim()}</td>`));
                            fila.append($(`<td>${$(this).find('NOMBRE').text()}</td>`));
                            valorHexadecimal=$(this).find('HEXADECIMAL').text();
                            fila.append($(`<td>${valorHexadecimal};</td>`));
                            fila.append($(`<td>${$(this).find('RGB').text()}</td>`));
                            fila.append($(`<td style='color: ${valorHexadecimal}; text-shadow:1px 1px Black;'><i class='bx ${claseIcono} bx-lg'></i></td>`));  
                            //fila.append($(`<td><i class='bx bx-hot' style='color: ${valorHexadecimal};'></i></td>`)); 
                            //fila.append($('<td><i class="bx bx-hot"></i></td>').find('i').css('color', valorHexadecimal).end());                                                                    
                            fila.append($("</tr>"));
                            $('#datos').append(fila);
                        }

                        
                        //alert("fila:"+fila);
                        
                        //Mostramos la tabla una vez rellenada
                        $("#datos").show();
                    });
            });
          
            
        };

        listarColores();

        }

        
    </script>
</body>
